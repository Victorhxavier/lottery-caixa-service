apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: lottery-caixa-service
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '10'
        run.googleapis.com/startup-cpu-boost: 'true'
        run.googleapis.com/cpu-throttling: 'false'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      serviceAccountName: lottery-service-sa
      containers:
      - image: gcr.io/PROJECT_ID/lottery-caixa-service:latest
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: ENVIRONMENT
          value: "production"
        - name: APP_NAME
          value: "lottery-caixa-service"
        - name: APP_VERSION
          value: "1.0.0"
        - name: CAIXA_BASE_URL
          value: "https://servicebus2.caixa.gov.br/portaldeloterias/api"
        - name: CAIXA_TIMEOUT
          value: "15"
        - name: CAIXA_RATE_LIMIT
          value: "2"
        - name: CAIXA_CACHE_TTL
          value: "5"
        - name: CAIXA_MAX_RETRIES
          value: "3"
        - name: CAIXA_RETRY_BACKOFF
          value: "1000"
        - name: CAIXA_USER_AGENT
          value: "LotteryService/1.0"
        - name: ASYNC_FORWARDING
          value: "false"
        resources:
          limits:
            cpu: '1'
            memory: 512Mi
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
  traffic:
  - percent: 100
    latestRevision: true
